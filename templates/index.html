<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 자산관리 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .table-container { max-height: 400px; overflow-y: auto; }
        th { position: sticky; top: 0; background-color: #f1f5f9; z-index: 10; }
    </style>
</head>
<body class="h-screen w-full flex text-slate-800">

    <aside class="w-1/4 bg-white border-r p-6 flex flex-col h-full shadow-sm">
        <h2 class="text-lg font-bold mb-4">📅 일일 시황 리포트</h2>
        <div class="mb-6 p-4 bg-blue-50 border border-blue-200 rounded-xl text-sm">
            <p class="font-bold text-blue-700">💡 Tip</p>
            <p class="text-slate-600">데이터가 안 보일 경우 F5를 눌러주세요.</p>
        </div>
        <div id="index-indicators" class="space-y-2">
            <div class="p-3 bg-slate-50 rounded-lg border text-xs">데이터 로딩 중...</div>
        </div>
    </aside>

    <main class="w-3/4 h-full p-8 overflow-y-auto flex flex-col gap-8">
        <header class="flex justify-between items-end border-b pb-4">
            <h1 class="text-2xl font-bold">📈 실시간 포트폴리오 히트맵</h1>
        </header>

        <section class="bg-white rounded-2xl shadow-sm border p-6">
            <h2 class="text-lg font-bold mb-4">💰 전체 자산 현황</h2>
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="w-full lg:w-3/5 table-container border rounded-xl">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="px-4 py-3">계좌</th><th class="px-4 py-3">종목</th><th class="px-4 py-3 text-right">수익률</th><th class="px-4 py-3 text-right">평가금액</th>
                            </tr>
                        </thead>
                        <tbody id="totalPortfolioTableBody" class="divide-y"></tbody>
                    </table>
                </div>
                <div class="w-full lg:w-2/5 bg-slate-50 rounded-xl p-4 border">
                    <div id="totalTreemapChart" style="min-height: 350px;"></div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border p-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">🔄 계좌별 리밸런싱</h2>
                <select id="accountSelector" class="bg-slate-50 border rounded-lg p-2 font-bold outline-none"></select>
            </div>
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="w-full lg:w-1/2 border rounded-xl table-container">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr><th class="px-4 py-3">종목</th><th class="px-4 py-3 text-center">비중</th><th class="px-4 py-3 text-center">가이드</th></tr>
                        </thead>
                        <tbody id="accountPortfolioTableBody" class="divide-y"></tbody>
                    </table>
                </div>
                <div class="w-full lg:w-1/2 bg-slate-50 rounded-xl p-4 border">
                    <div id="accountTreemapChart" style="min-height: 350px;"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let globalData = [];
        const fmt = (n) => n.toLocaleString('ko-KR');

        async function init() {
            try {
                const res = await fetch('/api/portfolio');
                globalData = await res.json();
                
                if(!globalData || globalData.length === 0) {
                    console.error("데이터가 비어있습니다.");
                    return;
                }

                renderTable(globalData);
                renderMainTreemap(globalData);
                
                const selector = document.getElementById('accountSelector');
                const accs = [...new Set(globalData.map(d => d.account))];
                selector.innerHTML = accs.map(a => `<option value="${a}">${a}</option>`).join('');
                
                updateAccountView(accs[0]);
                
                selector.addEventListener('change', (e) => updateAccountView(e.target.value));
            } catch (e) {
                console.error("초기화 실패:", e);
            }
        }

        function renderTable(data) {
            const body = document.getElementById('totalPortfolioTableBody');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-white transition-colors">
                    <td class="px-4 py-3 text-slate-500 text-xs">${item.account}</td>
                    <td class="px-4 py-3 font-bold">${item.asset}</td>
                    <td class="px-4 py-3 text-right font-bold ${item.return >= 0 ? 'text-red-500' : 'text-blue-500'}">${item.return}%</td>
                    <td class="px-4 py-3 text-right">${fmt(item.value)}원</td>
                </tr>
            `).join('');
        }

        function updateAccountView(accName) {
            const filtered = globalData.filter(d => d.account === accName);
            const body = document.getElementById('accountPortfolioTableBody');
            body.innerHTML = filtered.map(item => `
                <tr class="hover:bg-white transition-colors">
                    <td class="px-4 py-4 font-bold">${item.asset}</td>
                    <td class="px-4 py-4 text-center">${item.curWeight}%</td>
                    <td class="px-4 py-4 text-center">
                        <span class="px-2 py-1 rounded-full text-xs font-bold ${item.guideType === 'buy' ? 'bg-red-100 text-red-600' : (item.guideType === 'sell' ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500')}">
                            ${item.guide}
                        </span>
                    </td>
                </tr>
            `).join('');
            renderAccTreemap(accName, filtered);
        }

        function getChartOptions(seriesData, title) {
            return {
                series: [{ data: seriesData }],
                chart: { type: 'treemap', height: 350, toolbar: { show: false } },
                title: { text: title, align: 'center' },
                plotOptions: {
                    treemap: {
                        enableShades: true,
                        colorScale: {
                            ranges: [
                                { from: -100, to: -3, color: '#3b82f6' }, // 파랑
                                { from: -3, to: 0, color: '#93c5fd' },
                                { from: 0.01, to: 3, color: '#fca5a5' },
                                { from: 3, to: 100, color: '#ef4444' }   // 빨강
                            ]
                        }
                    }
                },
                dataLabels: {
                    enabled: true,
                    formatter: (text, op) => [text, op.value + '%'],
                    style: { fontSize: '12px' }
                }
            };
        }

        function renderMainTreemap(data) {
            const series = data.filter(d => d.value > 0).map(d => ({ x: d.asset, y: d.return, value: d.value }));
            const chart = new ApexCharts(document.querySelector("#totalTreemapChart"), getChartOptions(series, "전체 비중 & 수익률"));
            chart.render();
        }

        function renderAccTreemap(acc, data) {
            const series = data.filter(d => d.value > 0).map(d => ({ x: d.asset, y: d.return, value: d.value }));
            document.querySelector("#accountTreemapChart").innerHTML = ""; // 기존 차트 초기화
            const chart = new ApexCharts(document.querySelector("#accountTreemapChart"), getChartOptions(series, acc + " 현황"));
            chart.render();
        }

        window.onload = init;
    </script>
</body>
</html>
